aid: ralph-lauren-corporation
name: Ralph Lauren Corporation
description: >-
  Ralph Lauren Corporation (NYSE: RL) is a global premium-lifestyle company
  founded by Ralph Lauren in 1967 and headquartered in New York City. The
  company designs, markets, and distributes apparel, accessories, home, and
  fragrances across a portfolio of brands including Polo Ralph Lauren, Ralph
  Lauren Collection, Ralph Lauren Purple Label, Double RL (RRL), Lauren Ralph
  Lauren, and Chaps, along with Polo Golf, RLX, Pink Pony, Ralph Lauren Home
  and Paint, Ralph Lauren Watches and Fine Jewelry, and Ralph Lauren
  Restaurants. Direct-to-consumer commerce runs on Adobe Commerce, and
  category-extension brands are operated through licensing partners (eyewear
  via Luxottica, fragrances via L'Oréal). The corporation operates retail
  stores in dozens of countries with no publicly documented developer APIs,
  partner program portal, affiliate API, or open OpenAPI/Postman/GraphQL
  surface as of the profiling date.
